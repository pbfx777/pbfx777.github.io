  const clone = [...arr];
  for (let i = clone.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [clone[i], clone[j]] = [clone[j], clone[i]];

function roundRect(ctx, x, y, width, height, radius) {
  const r = Math.min(radius, width / 2, height / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + width, y, x + width, y + height, r);
  ctx.arcTo(x + width, y + height, x, y + height, r);
  ctx.arcTo(x, y + height, x, y, r);
  ctx.arcTo(x, y, x + width, y, r);
  ctx.closePath();
}

function drawResultImage(items) {
  const canvas = els.resultCanvas;
  const ctx = canvas.getContext('2d');
  const count = items.length;
  const cols = count <= 16 ? 4 : count <= 36 ? 5 : 6;
  const cell = 180;
  const gap = 18;
  const rows = Math.ceil(count / cols);
  canvas.width = cols * cell + (cols + 1) * gap;
  canvas.height = rows * cell + (rows + 1) * gap;

  const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
  bg.addColorStop(0, '#fff8fc');
  bg.addColorStop(1, '#ffeef6');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  return Promise.all(items.map(item => new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve({ item, img });
    img.onerror = () => resolve({ item, img: null });
    img.src = item.src;
  }))).then(loaded => {
    loaded.forEach(({img}, index) => {
      const col = index % cols;
      const row = Math.floor(index / cols);
      const x = gap + col * (cell + gap);
      const y = gap + row * (cell + gap);

      ctx.save();
      roundRect(ctx, x, y, cell, cell, 22);
      ctx.clip();
      const cellBg = ctx.createLinearGradient(x, y, x, y + cell);
      cellBg.addColorStop(0, '#fffdfd');

      ctx.fillStyle = cellBg;
      ctx.fillRect(x, y, cell, cell);

      ctx.strokeStyle = 'rgba(255, 140, 190, .35)';
      ctx.lineWidth = 2;
      roundRect(ctx, x, y, cell, cell, 22);

      ctx.fillText(`#${index + 1}`, x + 18, y + 27);

          state.currentCleanup = null;
        }
      }

      function updateEstimate() {
        const remaining = Math.max(0, state.totalComparisons - state.doneComparisons);
        els.estimateCount.textContent = remaining;
      }
      
      function pick(winner) {
        if (state.clickLocked || state.autoPicking) return;
        if (myRunId !== state.runId) return;
        if (state.clickLocked || state.autoPicking) return;
        state.clickLocked = true;
        cleanup();
        state.choiceHistory.push(winner);
        state.doneComparisons++;
        updateEstimate();
        state.history.push({ choiceLength: state.choiceHistory.length });
        state.currentSelection = state.choiceHistory.length;
        updateStats();
        requestAnimationFrame(() => {
          if (myRunId !== state.runId) return;
          state.currentResolver = null;
          resolve(winner === 'left' ? -1 : 1);
        });
      }

      state.currentCleanup = cleanup;
      els.leftCard.addEventListener('click', leftClick);
      els.rightCard.addEventListener('click', rightClick);
      document.addEventListener('keydown', keyHandler);
    });
  };
}

async function mergeSort(arr, compare) {
  if (arr.length <= 1) return arr;
  const mid = Math.floor(arr.length / 2);
  const left = await mergeSort(arr.slice(0, mid), compare);
  const right = await mergeSort(arr.slice(mid), compare);
  return await merge(left, right, compare);
}

async function merge(left, right, compare) {
  const result = [];
  let i = 0, j = 0;
  while (i < left.length && j < right.length) {
    const c = await compare(left[i], right[j]);
    if (c <= 0) result.push(left[i++]);
    else result.push(right[j++]);
  }
  return result.concat(left.slice(i), right.slice(j));
}

async function runSort(replayChoices = [], preserveShuffle = false) {
  state.runId += 1;
  const myRunId = state.runId;

  if (state.currentCleanup) {
    state.currentCleanup();
  }

  state.finished = false;
  state.replayChoices = [...replayChoices];
  state.history = [];
  state.choiceHistory = [];
  state.sorted = [];
  state.currentLeft = null;
  state.currentRight = null;
  state.autoPicking = false;
  state.clickLocked = false;

  if (!preserveShuffle || state.shuffled.length === 0) {
    state.shuffled = shuffle(ITEMS);
  }

  state.totalSelections = 0;
  state.currentSelection = 0;
  els.startBtn.classList.add('hidden');
  els.saveImageBtn.classList.add('hidden');
  els.resultPanel.classList.add('hidden');
  els.battlePanel.classList.remove('hidden');
  updateStats();

  const compare = compareFactory();
  const sorted = await mergeSort(state.shuffled, compare);

  if (myRunId !== state.runId) return;

  state.sorted = sorted;
  state.finished = true;
  state.currentSelection = state.choiceHistory.length;
  state.clickLocked = false;
  updateStats();
  els.battlePanel.classList.add('hidden');
  els.resultPanel.classList.remove('hidden');
  els.undoBtn.classList.add('hidden');
  els.saveImageBtn.classList.remove('hidden');
  await drawResultImage(sorted);
}

function start() {
  runSort([], false);
  state.totalComparisons = Math.ceil(state.characters.length * Math.log2(state.characters.length));
  state.doneComparisons = 0;
}

function restart() {
  runSort([], false);
}

function undoLastChoice() {
  if (state.choiceHistory.length === 0 || state.autoPicking || state.clickLocked || state.finished) return;
  const replay = state.choiceHistory.slice(0, -1);
  runSort(replay, true);
}

function downloadCanvas() {
  const dataUrl = els.resultCanvas.toDataURL('image/png');
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  if (isIOS) {
    const w = window.open('');
    if (w) {
      w.document.write(`<title>长按保存图片</title><img src="${dataUrl}" style="max-width:100%;display:block;margin:auto;" />`);
      w.document.close();
    } else {
      location.href = dataUrl;
    }
    return;
  }

  const link = document.createElement('a');
  link.download = 'enstars_sorted_result.png';
  link.href = dataUrl;
  document.body.appendChild(link);
  link.click();
  link.remove();
}

els.startBtn.addEventListener('click', start);
els.restartBtn.addEventListener('click', restart);
els.undoBtn.addEventListener('click', undoLastChoice);
els.saveImageBtn.addEventListener('click', downloadCanvas);

document.addEventListener('keydown', (e) => {
  if (e.key === 'Backspace' && !state.finished && state.choiceHistory.length > 0) {
    e.preventDefault();
    undoLastChoice();
  }
});

els.totalCount.textContent = ITEMS.length;
state.totalSelections = estimateComparisons(ITEMS.length);
updateStats();
</script>
